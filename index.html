<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Day Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:#2e2e38;
  --accent:#7c6af7;--accent2:#a78bfa;--accent-glow:rgba(124,106,247,0.18);
  --green:#22d3a0;--green-bg:rgba(34,211,160,0.08);
  --red:#f87171;--red-bg:rgba(248,113,113,0.08);
  --yellow:#fbbf24;--yellow-bg:rgba(251,191,36,0.08);
  --text:#e8e8f0;--text2:#9898b0;--text3:#55556a;
  --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;
  --radius:12px;--radius-sm:8px;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,106,247,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,106,247,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(124,106,247,0.12) 0%,transparent 70%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px 80px}
.header{text-align:center;margin-bottom:40px;animation:fadeDown 0.6s ease both}
.header-label{font-family:var(--mono);font-size:11px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:14px}
.header h1{font-size:clamp(24px,5vw,40px);font-weight:600;line-height:1.2;letter-spacing:-0.5px}
.header h1 span{color:var(--accent2)}
.header p{margin-top:10px;color:var(--text2);font-size:15px;font-weight:300;max-width:420px;margin-inline:auto;line-height:1.6}

/* MAIN LAYOUT */
.main{width:100%;max-width:680px}

/* TIME BAR */
.time-bar{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 18px;margin-bottom:20px}
.clock{font-family:var(--mono);font-size:16px;color:var(--accent2);font-weight:700}
.date-label{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:1px}

/* ADD TASK CARD */
.add-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:20px;position:relative;overflow:hidden}
.add-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.add-card-title{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
label{font-size:12px;color:var(--text3);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase}
input[type="time"],input[type="text"],select{
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text);font-family:var(--sans);font-size:14px;padding:10px 14px;outline:none;
  transition:border-color 0.2s;width:100%
}
input:focus,select:focus{border-color:var(--accent)}
select{cursor:pointer}
select option{background:var(--surface2)}
.btn-add{width:100%;padding:14px;background:var(--accent);color:#fff;font-family:var(--sans);font-size:15px;font-weight:600;border:none;border-radius:var(--radius);cursor:pointer;transition:background 0.2s,box-shadow 0.2s;margin-top:4px}
.btn-add:hover{background:#6a59e0;box-shadow:0 0 24px rgba(124,106,247,0.35)}

/* PROGRESS */
.progress-section{margin-bottom:16px}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.progress-label{font-size:12px;color:var(--text3);font-family:var(--mono)}
.progress-pct{font-size:12px;color:var(--accent2);font-family:var(--mono)}
.progress-bar-wrap{background:var(--surface2);border-radius:99px;height:6px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:99px;transition:width 0.5s ease;width:0%}

/* TASK LIST */
.task-list{display:flex;flex-direction:column;gap:10px}
.empty-state{text-align:center;padding:48px 20px;color:var(--text3);font-size:14px;font-family:var(--mono)}
.empty-state .icon{font-size:36px;margin-bottom:12px}

.task-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:all 0.2s;position:relative;overflow:hidden}
.task-card.study{border-left:3px solid var(--accent)}
.task-card.break{border-left:3px solid var(--green)}
.task-card.sleep{border-left:3px solid var(--text3)}
.task-card.done-card{opacity:0.4}
.task-card.done-card .task-title{text-decoration:line-through;color:var(--text3)}
.task-card.active-now{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 0 20px var(--accent-glow)}

.task-checkbox{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);background:transparent;cursor:pointer;appearance:none;-webkit-appearance:none;transition:all 0.2s;position:relative;flex-shrink:0}
.task-checkbox:checked{background:var(--green);border-color:var(--green)}
.task-checkbox:checked::after{content:'';position:absolute;top:2px;left:5px;width:6px;height:9px;border:2px solid #0d0d0f;border-top:none;border-left:none;transform:rotate(45deg)}
.task-checkbox:hover{border-color:var(--green)}

.task-body{flex:1;min-width:0}
.task-time{font-family:var(--mono);font-size:11px;color:var(--accent2);margin-bottom:3px}
.task-card.break .task-time{color:var(--green)}
.task-card.sleep .task-time{color:var(--text3)}
.task-title{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.task-badge{font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;padding:2px 7px;border-radius:99px;margin-top:4px;display:inline-block}
.badge-study{background:var(--accent-glow);color:var(--accent2);border:1px solid rgba(124,106,247,0.25)}
.badge-break{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,211,160,0.2)}
.badge-sleep{background:rgba(85,85,106,0.12);color:var(--text3);border:1px solid var(--border)}

.task-actions{display:flex;gap:4px;flex-shrink:0}
.btn-icon{background:none;border:none;cursor:pointer;font-size:14px;padding:5px 7px;border-radius:6px;color:var(--text3);transition:all 0.2s}
.btn-icon.edit:hover{color:var(--yellow);background:var(--yellow-bg)}
.btn-icon.del:hover{color:var(--red);background:var(--red-bg)}

.active-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-family:var(--mono);color:var(--accent2);background:var(--accent-glow);border:1px solid rgba(124,106,247,0.3);border-radius:99px;padding:2px 7px;margin-left:6px}
.active-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 1.2s ease infinite}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:26px;width:100%;max-width:420px;animation:fadeUp 0.3s ease both}
.modal h3{font-size:17px;font-weight:600;margin-bottom:18px}
.modal .form-row{margin-bottom:0}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.btn-save{flex:1;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--sans);font-size:14px;font-weight:600;transition:background 0.2s}
.btn-save:hover{background:#6a59e0}
.btn-cancel{padding:12px 18px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-family:var(--sans);font-size:14px;transition:all 0.2s}
.btn-cancel:hover{border-color:var(--accent)}

/* TOAST */
#toast-container{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:10px;max-width:300px}
.toast{background:var(--surface);border:1px solid var(--accent);border-radius:var(--radius);padding:12px 16px;animation:slideIn 0.4s ease both;position:relative;overflow:hidden}
.toast::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.toast-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.toast-msg{font-size:11px;color:var(--text2);line-height:1.5}

@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-label">⬡ Day Planner</div>
    <h1>Plan your <span>perfect day</span></h1>
    <p>Add your tasks, study sessions, and breaks. Track your progress in real time.</p>
  </div>

  <div class="main">

    <!-- TIME BAR -->
    <div class="time-bar">
      <div class="date-label" id="dateLabel">--</div>
      <div class="clock" id="clockDisplay">--:--:--</div>
    </div>

    <!-- ADD TASK -->
    <div class="add-card">
      <div class="add-card-title">// add new task</div>
      <div class="form-row">
        <div class="form-group">
          <label>Start Time</label>
          <input type="time" id="newStart"/>
        </div>
        <div class="form-group">
          <label>End Time</label>
          <input type="time" id="newEnd"/>
        </div>
        <div class="form-group full">
          <label>Task Name</label>
          <input type="text" id="newTitle" placeholder="e.g. Study — Mathematics" maxlength="60"/>
        </div>
        <div class="form-group full">
          <label>Type</label>
          <select id="newType">
            <option value="study">📚 Study Session</option>
            <option value="break">☕ Break / Rest / Other</option>
            <option value="sleep">🌙 Sleep</option>
          </select>
        </div>
      </div>
      <button class="btn-add" onclick="addTask()">+ Add Task</button>
    </div>

    <!-- PROGRESS -->
    <div class="progress-section">
      <div class="progress-top">
        <span class="progress-label" id="progressLabel">0 of 0 completed</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>
    </div>

    <!-- TASK LIST -->
    <div class="task-list" id="taskList">
      <div class="empty-state">
        <div class="icon">📋</div>
        Add your first task above to get started!
      </div>
    </div>

  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>Edit Task</h3>
    <div class="form-row">
      <div class="form-group"><label>Start Time</label><input type="time" id="editStart"/></div>
      <div class="form-group"><label>End Time</label><input type="time" id="editEnd"/></div>
      <div class="form-group full"><label>Task Name</label><input type="text" id="editTitle" maxlength="60"/></div>
      <div class="form-group full">
        <label>Type</label>
        <select id="editType">
          <option value="study">📚 Study Session</option>
          <option value="break">☕ Break / Rest / Other</option>
          <option value="sleep">🌙 Sleep</option>
        </select>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
let tasks = [], editingIndex = null;

function saveTasks() {
  try { localStorage.setItem('dayplanner_tasks', JSON.stringify(tasks)); } catch(e) {}
}
function loadTasks() {
  try { const d = localStorage.getItem('dayplanner_tasks'); if (d) tasks = JSON.parse(d); } catch(e) {}
}

// ── CLOCK ──
function startClock() {
  const tick = () => {
    const now = new Date();
    document.getElementById('clockDisplay').textContent = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
    document.getElementById('dateLabel').textContent = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    highlightCurrent();
  };
  tick();
  setInterval(tick, 1000);
}

// ── ADD TASK ──
function addTask() {
  const start = document.getElementById('newStart').value;
  const end   = document.getElementById('newEnd').value;
  const title = document.getElementById('newTitle').value.trim();
  const type  = document.getElementById('newType').value;

  if (!start || !end || !title) { showToast('⚠️ Please fill in all fields.'); return; }
  if (start >= end) { showToast('⚠️ End time must be after start time.'); return; }

  tasks.push({ start, end, title, type, done: false });
  tasks.sort((a,b) => a.start.localeCompare(b.start));
  saveTasks();

  // clear inputs
  document.getElementById('newStart').value = '';
  document.getElementById('newEnd').value = '';
  document.getElementById('newTitle').value = '';

  renderTasks();
  showToast('✅ Task added!');
}

// ── RENDER ──
function renderTasks() {
  const list = document.getElementById('taskList');
  if (tasks.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📋</div>Add your first task above to get started!</div>';
    updateProgress();
    return;
  }
  list.innerHTML = '';
  const labels = { study:'Study', break:'Break', sleep:'Sleep' };
  tasks.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = `task-card ${t.type}${t.done?' done-card':''}`;
    card.id = `task-${i}`;
    card.innerHTML = `
      <input type="checkbox" class="task-checkbox" ${t.done?'checked':''} onchange="toggleDone(${i},this)"/>
      <div class="task-body">
        <div class="task-time">${fmtTime(t.start)} – ${fmtTime(t.end)}</div>
        <div class="task-title">${esc(t.title)}</div>
        <span class="task-badge badge-${t.type}">${labels[t.type]}</span>
      </div>
      <div class="task-actions">
        <button class="btn-icon edit" onclick="openEdit(${i})" title="Edit">✎</button>
        <button class="btn-icon del" onclick="deleteTask(${i})" title="Delete">✕</button>
      </div>`;
    list.appendChild(card);
  });
  highlightCurrent();
  updateProgress();
}

function toggleDone(i, cb) {
  tasks[i].done = cb.checked;
  document.getElementById(`task-${i}`).classList.toggle('done-card', tasks[i].done);
  saveTasks();
  updateProgress();
}

function updateProgress() {
  const total = tasks.length, done = tasks.filter(t=>t.done).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressBar').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = `${done} of ${total} completed`;
  document.getElementById('progressPct').textContent = pct+'%';
}

function highlightCurrent() {
  const now = new Date(), nowMin = now.getHours()*60+now.getMinutes();
  tasks.forEach((t,i) => {
    const card = document.getElementById(`task-${i}`);
    if (!card) return;
    const b = card.querySelector('.active-badge');
    if (b) b.remove();
    const [sh,sm] = t.start.split(':').map(Number);
    const [eh,em] = t.end.split(':').map(Number);
    const active = nowMin >= sh*60+sm && nowMin < eh*60+em;
    card.classList.toggle('active-now', active);
    if (active) {
      const badge = document.createElement('span');
      badge.className = 'active-badge';
      badge.innerHTML = '<span class="active-dot"></span>NOW';
      card.querySelector('.task-body').appendChild(badge);
    }
  });
}

// ── EDIT ──
function openEdit(i) {
  editingIndex = i;
  const t = tasks[i];
  document.getElementById('editStart').value = t.start;
  document.getElementById('editEnd').value = t.end;
  document.getElementById('editTitle').value = t.title;
  document.getElementById('editType').value = t.type;
  document.getElementById('editModal').classList.add('open');
}
function closeModal() { document.getElementById('editModal').classList.remove('open'); editingIndex=null; }
function saveEdit() {
  if (editingIndex===null) return;
  const start = document.getElementById('editStart').value;
  const end   = document.getElementById('editEnd').value;
  if (start >= end) { showToast('⚠️ End time must be after start time.'); return; }
  tasks[editingIndex] = { ...tasks[editingIndex], start, end, title: document.getElementById('editTitle').value.trim(), type: document.getElementById('editType').value };
  tasks.sort((a,b) => a.start.localeCompare(b.start));
  saveTasks();
  closeModal(); renderTasks();
}

// ── DELETE ──
function deleteTask(i) { tasks.splice(i,1); saveTasks(); renderTasks(); showToast('🗑️ Task removed.'); }

// ── TOAST ──
function showToast(msg) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<div class="toast-msg">${esc(msg)}</div>`;
  c.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity 0.4s'; setTimeout(()=>t.remove(),400); }, 3000);
}

// ── HELPERS ──
function fmtTime(t) {
  if (!t) return '';
  const [h,m] = t.split(':').map(Number);
  return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('editModal').addEventListener('click', e => { if(e.target===document.getElementById('editModal')) closeModal(); });
document.getElementById('newTitle').addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });

loadTasks();
startClock();
renderTasks();
</script>
</body>
</html>
